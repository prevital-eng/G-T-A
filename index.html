<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GimlaTech Helper</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap');
        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: #f1f5f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
        }
        /* מסגרת האפליקציה */
        .phone-frame { 
            width: 100%; 
            max-width: 400px; 
            height: 85vh; 
            background: white; 
            border-radius: 3rem; 
            border: 12px solid #1e293b; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            position: relative; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .content-area { overflow-y: auto; flex-grow: 1; padding: 1.5rem; }
        .btn-large { transition: all 0.2s; border: 2px solid #e2e8f0; }
        .btn-large:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 28, className="" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [step, setStep] = useState(1);
            const [selection, setSelection] = useState({ device: '', os: '' });

            // הגדרות מערכות הפעלה לפי מכשיר
            const config = {
                pc: {
                    label: 'מחשב',
                    options: ['Windows (ווינדוס)', 'Mac (מחשב אפל)']
                },
                phone: {
                    label: 'טלפון',
                    options: ['Android (סמסונג/שיאומי)', 'iPhone (אפל)']
                },
                peripheral: {
                    label: 'ציוד היקפי',
                    options: ['מדפסת', 'רמקולים/אוזניות', 'עכבר ומקלדת']
                }
            };

            const reset = () => { setStep(1); setSelection({ device: '', os: '' }); };

            return (
                <div className="phone-frame">
                    {/* Header הקבוע */}
                    <div className="bg-slate-800 text-white p-5 flex justify-between items-center shadow-md">
                        <div className="flex items-center gap-2">
                            <Icon name="life-buoy" className="text-blue-400" />
                            <span className="font-bold">GimlaTech</span>
                        </div>
                        <button onClick={() => alert('הקישור הועתק!')} className="p-2 bg-slate-700 rounded-full hover:bg-slate-600 transition-colors">
                            <Icon name="share-2" size={18} />
                        </button>
                    </div>

                    <div className="content-area">
                        
                        {/* מסך 1: בחירת מכשיר */}
                        {step === 1 && (
                            <div className="space-y-4">
                                <div className="text-center mb-8">
                                    <h2 className="text-2xl font-bold text-slate-800">במה אפשר לעזור?</h2>
                                    <p className="text-slate-500">בחר את סוג המכשיר הבעייתי</p>
                                </div>
                                
                                <button onClick={() => { setSelection({device: 'pc'}); setStep(2); }} className="w-full btn-large bg-white p-6 rounded-2xl flex items-center shadow-sm hover:border-blue-500">
                                    <div className="bg-blue-100 p-3 rounded-xl ml-4 text-blue-600"><Icon name="monitor"/></div>
                                    <span className="text-xl font-bold">מחשב</span>
                                </button>

                                <button onClick={() => { setSelection({device: 'phone'}); setStep(2); }} className="w-full btn-large bg-white p-6 rounded-2xl flex items-center shadow-sm hover:border-green-500">
                                    <div className="bg-green-100 p-3 rounded-xl ml-4 text-green-600"><Icon name="smartphone"/></div>
                                    <span className="text-xl font-bold">טלפון</span>
                                </button>

                                <button onClick={() => { setSelection({device: 'peripheral'}); setStep(2); }} className="w-full btn-large bg-white p-6 rounded-2xl flex items-center shadow-sm hover:border-purple-500">
                                    <div className="bg-purple-100 p-3 rounded-xl ml-4 text-purple-600"><Icon name="printer"/></div>
                                    <span className="text-xl font-bold">ציוד היקפי</span>
                                </button>

                                <button className="w-full mt-6 py-4 border-2 border-dashed border-slate-300 rounded-2xl text-slate-500 font-bold flex justify-center items-center gap-2">
                                    <Icon name="camera" size={20}/> העלאת צילום מסך
                                </button>
                            </div>
                        )}

                        {/* מסך 2: מערכת הפעלה מותאמת אישית */}
                        {step === 2 && (
                            <div className="space-y-4">
                                <button onClick={reset} className="text-blue-600 font-bold flex items-center gap-1 mb-4">
                                    <Icon name="chevron-right" size={20}/> חזרה למסך הראשי
                                </button>
                                
                                <h2 className="text-xl font-bold text-slate-800">איזה {config[selection.device].label} יש לך?</h2>
                                
                                {config[selection.device].options.map(os => (
                                    <button key={os} onClick={() => setStep(3)} className="w-full p-5 bg-white border-2 border-slate-100 rounded-xl text-right text-lg font-bold shadow-sm hover:bg-blue-50 hover:border-blue-300 transition-all">
                                        {os}
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* מסך 3: בחירת תקלה */}
                        {step === 3 && (
                            <div className="space-y-4">
                                <button onClick={() => setStep(2)} className="text-blue-600 font-bold flex items-center gap-1 mb-4">
                                    <Icon name="chevron-right" size={20}/> חזרה
                                </button>
                                
                                <h2 className="text-xl font-bold text-slate-800 mb-2">מה הבעיה?</h2>
                                
                                {['האינטרנט לא עובד 🌐', 'המכשיר לא נדלק 🔌', 'המסך קפוא ❄️', 'יש הודעת שגיאה ⚠️'].map(issue => (
                                    <button key={issue} className="w-full p-4 bg-white border-r-8 border-blue-500 rounded-lg shadow-sm text-right font-medium hover:bg-slate-50">
                                        {issue}
                                    </button>
                                ))}
                                
                                <div className="mt-6 bg-blue-50 p-4 rounded-2xl border border-blue-100">
                                    <h3 className="font-bold text-blue-900 mb-2">עזרה חכמה (AI)</h3>
                                    <textarea className="w-full p-3 rounded-xl border border-blue-200 text-sm" placeholder="תארו כאן את התקלה במילים שלכם..."></textarea>
                                    <button className="w-full bg-blue-600 text-white mt-3 py-3 rounded-xl font-bold shadow-md">בקש פתרון</button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Footer קבוע */}
                    <div className="p-4 bg-slate-50 border-t text-center">
                        <p className="text-xs text-slate-400 font-medium">© 2026 GimlaTech Helper - נגישות טכנולוגית</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
