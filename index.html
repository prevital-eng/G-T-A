<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GimlaTech Helper</title>
    <style>
        :root { --main: #2563eb; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: #e2e8f0; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* מסגרת האפליקציה */
        .app-shell { 
            width: 360px; height: 700px; background: white; 
            border: 10px solid var(--dark); border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            display: flex; flex-direction: column; overflow: hidden;
        }

        .header { background: var(--dark); color: white; padding: 20px; text-align: center; font-weight: bold; }
        .container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        
        .btn { 
            width: 100%; padding: 18px; margin-bottom: 12px; 
            background: white; border: 2px solid #cbd5e1; border-radius: 15px; 
            cursor: pointer; font-size: 17px; font-weight: bold; text-align: right;
            display: flex; align-items: center;
        }
        .btn:active { background: #f1f5f9; border-color: var(--main); }
        .icon { font-size: 24px; margin-left: 15px; }

        .hidden { display: none; }
        .back-btn { color: var(--main); cursor: pointer; font-weight: bold; margin-bottom: 15px; border: none; background: none; font-size: 14px; }
        
        textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; margin: 10px 0; font-family: inherit; resize: none; box-sizing: border-box; }
        .send-btn { background: var(--main); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        
        .footer { padding: 10px; text-align: center; border-top: 1px solid #f1f5f9; }
        .share { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 5px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">GimlaTech Helper</div>

    <div class="container">
        <div id="s1">
            <h2 style="font-size: 20px; text-align: center;">במה אפשר לעזור?</h2>
            <button class="btn" onclick="go2('pc')"><span class="icon">💻</span>מחשב</button>
            <button class="btn" onclick="go2('phone')"><span class="icon">📱</span>טלפון</button>
            <button class="btn" onclick="go2('extra')"><span class="icon">🖨️</span>ציוד היקפי</button>
            
            <div style="border: 2px dashed #cbd5e1; padding: 15px; border-radius: 15px; text-align: center; margin-top: 20px; color: #64748b;">
                📸 העלאת צילום מסך
            </div>
        </div>

        <div id="s2" class="hidden">
            <button class="back-btn" onclick="go1()">← חזרה</button>
            <h2 id="os-title" style="font-size: 18px;">איזו מערכת?</h2>
            <div id="os-list"></div>
        </div>

        <div id="s3" class="hidden">
            <button class="back-btn" onclick="goBackTo2()">← חזרה</button>
            <h2 style="font-size: 18px;">מה הבעיה?</h2>
            <button class="btn" onclick="done()">🌐 האינטרנט לא עובד</button>
            <button class="btn" onclick="done()">🔌 המכשיר לא נדלק</button>
            <button class="btn" onclick="done()">❄️ הכל קפוא</button>
            
            <div style="margin-top: 20px; padding: 15px; background: #eff6ff; border-radius: 15px;">
                <label style="font-weight: bold; font-size: 14px;">תיאור חופשי לעזרה מה-AI:</label>
                <textarea id="ai-input" placeholder="כתבו כאן מה קרה..."></textarea>
                <button class="send-btn" onclick="done()">שלח לבדיקת AI</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <button class="share" onclick="alert('הקישור הועתק!')">🔗 שיתוף אפליקציה</button>
    </div>
</div>

<script>
    // הגדרות נתונים
    const data = {
        pc: { t: 'איזה מחשב?', list: ['Windows (ווינדוס)', 'Mac (אפל)'] },
        phone: { t: 'איזה טלפון?', list: ['Android (סמסונג/אחר)', 'iPhone (אפל)'] },
        extra: { t: 'איזה ציוד?', list: ['מדפסת', 'רמקולים', 'עכבר/מקלדת'] }
    };

    let selectedDevice = '';

    // פונקציות ניווט פשוטות (ללא ספריות חיצוניות)
    function go1() {
        document.getElementById('s2').className = 'hidden';
        document.getElementById('s1').className = '';
    }

    function go2(device) {
        selectedDevice = device;
        document.getElementById('s1').className = 'hidden';
        document.getElementById('s2').className = '';
        
        document.getElementById('os-title').innerText = data[device].t;
        const listDiv = document.getElementById('os-list');
        listDiv.innerHTML = '';
        
        data[device].list.forEach(item => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = item;
            b.onclick = go3;
            listDiv.appendChild(b);
        });
    }

    function go3() {
        document.getElementById('s2').className = 'hidden';
        document.getElementById('s3').className = '';
    }

    function goBackTo2() {
        document.getElementById('s3').className = 'hidden';
        document.getElementById('s2').className = '';
    }

    function done() {
        alert("הבקשה התקבלה! \nאנחנו מנתחים את התקלה עבורכם.");
        // במקום לרענן (שיכול לגרום לבעיות בסביבות מסוימות), פשוט נחזור להתחלה
        document.getElementById('ai-input').value = '';
        go1();
        document.getElementById('s3').className = 'hidden';
    }
</script>

</body>
</html>
