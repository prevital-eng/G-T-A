<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GimlaTech Helper</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --dark: #1e293b; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #cbd5e1; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* מסגרת האפליקציה - "המכשיר" */
        .phone-wrapper { 
            width: 375px; height: 750px; background: white; 
            border: 12px solid var(--dark); border-radius: 45px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); 
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        .app-header { background: var(--dark); color: white; padding: 25px 20px 15px; text-align: center; font-weight: bold; font-size: 20px; border-bottom: 2px solid #334155; }
        .content { flex: 1; padding: 20px; overflow-y: auto; background: #f8fafc; }
        
        .step-title { font-size: 22px; font-weight: bold; color: var(--dark); margin-bottom: 10px; text-align: center; }
        .step-desc { font-size: 15px; color: #64748b; text-align: center; margin-bottom: 25px; }

        .btn-option { 
            width: 100%; padding: 20px; margin-bottom: 15px; 
            background: white; border: 2px solid #e2e8f0; border-radius: 18px; 
            display: flex; align-items: center; cursor: pointer; transition: 0.2s; 
            font-size: 18px; font-weight: bold; color: var(--dark); text-align: right;
        }
        .btn-option:active { transform: scale(0.97); border-color: var(--primary); background: #eff6ff; }
        .icon-circle { width: 45px; height: 45px; border-radius: 12px; margin-left: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        .back-link { color: var(--primary); font-weight: bold; cursor: pointer; display: block; margin-bottom: 15px; font-size: 14px; }
        .hidden { display: none; }

        /* אזור AI */
        .ai-box { background: #f0f7ff; border: 1px solid #c3dafe; padding: 15px; border-radius: 20px; margin-top: 20px; }
        textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 12px; padding: 10px; margin: 10px 0; font-family: inherit; box-sizing: border-box; }
        .btn-send { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }

        .share-bar { padding: 15px; border-top: 1px solid #e2e8f0; text-align: center; }
        .btn-share { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: bold; color: #475569; }
    </style>
</head>
<body>

<div class="phone-wrapper">
    <div class="app-header">GimlaTech Helper</div>

    <div class="content">
        <div id="screen1">
            <div class="step-title">שלום! במה נטפל?</div>
            <div class="step-desc">בחרו את סוג המכשיר הבעייתי:</div>
            
            <div class="btn-option" onclick="showOS('pc')">
                <div class="icon-circle" style="background: #dbeafe;">💻</div>
                <span>מחשב</span>
            </div>
            <div class="btn-option" onclick="showOS('phone')">
                <div class="icon-circle" style="background: #dcfce7;">📱</div>
                <span>טלפון</span>
            </div>
            <div class="btn-option" onclick="showOS('extra')">
                <div class="icon-circle" style="background: #f3e8ff;">🖨️</div>
                <span>ציוד היקפי</span>
            </div>
            
            <div style="text-align:center; margin-top: 20px; color: #94a3b8; font-weight: bold; border: 2px dashed #cbd5e1; padding: 15px; border-radius: 15px;">
                📸 העלאת צילום מסך
            </div>
        </div>

        <div id="screen2" class="hidden">
            <div class="back-link" onclick="showScreen(1)">← חזרה למסך הראשי</div>
            <div class="step-title" id="os-title">איזו מערכת?</div>
            <div id="os-container"></div>
        </div>

        <div id="screen3" class="hidden">
            <div class="back-link" onclick="showScreen(2)">← חזרה</div>
            <div class="step-title">מה הבעיה?</div>
            
            <div id="issues-container">
                <div class="btn-option" onclick="handleFinish()">🌐 האינטרנט לא עובד</div>
                <div class="btn-option" onclick="handleFinish()">🔌 לא נדלק / לא מגיב</div>
                <div class="btn-option" onclick="handleFinish()">❄️ המכשיר קפוא</div>
            </div>

            <div class="ai-box">
                <div style="font-weight: bold; color: #1e40af;">תיאור חופשי (AI):</div>
                <textarea id="ai-text" placeholder="למשל: המדפסת מוציאה דפים ריקים..."></textarea>
                <button class="btn-send" onclick="handleFinish()">בקש עזרה מה-AI</button>
            </div>
        </div>
    </div>

    <div class="share-bar">
        <button class="btn-share" onclick="alert('הקישור הועתק!')">🔗 שיתוף אפליקציה</button>
    </div>
</div>

<script>
    const osData = {
        pc: { title: 'איזה מחשב זה?', options: ['Windows (ווינדוס)', 'Mac (אפל)'] },
        phone: { title: 'איזה טלפון זה?', options: ['Android (סמסונג/אחר)', 'iPhone (אפל)'] },
        extra: { title: 'איזה ציוד זה?', options: ['מדפסת', 'רמקולים', 'מקלדת/עכבר'] }
    };

    function showScreen(num) {
        document.getElementById('screen1').classList.add('hidden');
        document.getElementById('screen2').classList.add('hidden');
        document.getElementById('screen3').classList.add('hidden');
        document.getElementById('screen' + num).classList.remove('hidden');
    }

    function showOS(device) {
        const container = document.getElementById('os-container');
        document.getElementById('os-title').innerText = osData[device].title;
        container.innerHTML = '';
        
        osData[device].options.forEach(os => {
            const btn = document.createElement('div');
            btn.className = 'btn-option';
            btn.innerHTML = `<span>${os}</span>`;
            btn.onclick = () => showScreen(3);
            container.appendChild(btn);
        });
        showScreen(2);
    }

    function handleFinish() {
        const text = document.getElementById('ai-text').value;
        alert("הבקשה התקבלה בהצלחה!\nאנחנו מנתחים את התקלה ומחזירים תשובה...");
        location.reload();
    }
</script>

</body>
</html>
