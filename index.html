<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GimlaTech AI Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d121f;
            --surface: #1a2235;
            --surface2: #222b42;
            --border: #2d3748;
            --accent: #38bdf8;
            --purple: #818cf8;
            --green: #25d366;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #f87171;
            --warn: #fbbf24;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .card {
            background-color: var(--surface);
            border: 2px solid var(--border);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            background-color: var(--surface2);
        }

        .screen {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-input {
            background: var(--surface);
            border: 2px solid var(--border);
            color: white;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
            outline: none;
        }

        .footer-container {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            padding: 0 20px;
            z-index: 100;
        }

        .whatsapp-btn {
            background-color: var(--green);
            color: white;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease;
        }

        .tag {
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .tag.active {
            background: rgba(56, 189, 248, 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(129, 140, 248, 0.3);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .step-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid var(--border);
        }

        .step-dot.active { border-color: var(--accent); color: var(--accent); }
        .step-dot.done { background: var(--accent); border-color: var(--accent); color: #000; }
        .step-line { flex: 1; height: 2px; background: var(--border); }
        .step-line.done { background: var(--accent); }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <header class="w-full py-6 flex justify-center items-center gap-3 border-b border-gray-800">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-black tracking-tighter">Gimla<span class="text-sky-400">Tech</span></span>
            <span class="bg-indigo-500/10 text-indigo-400 text-xs font-bold px-2 py-1 rounded-full border border-indigo-500/20">AI HELPER</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto w-full px-6 py-8">

        <!-- Screen 1: Device Selection -->
        <div id="screen-device" class="screen active">
            <h1 class="text-3xl font-extrabold mb-2 text-center">במה לעזור היום?</h1>
            <p class="text-gray-400 text-center mb-8 text-lg">בחר את סוג המכשיר של המבוגר</p>
            
            <div class="flex items-center gap-2 mb-10 max-w-xs mx-auto">
                <div class="step-dot active">1</div>
                <div class="step-line"></div>
                <div class="step-dot">2</div>
                <div class="step-line"></div>
                <div class="step-dot">3</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <button onclick="selectDevice('computer', 'מחשב')" class="card rounded-2xl p-6 flex flex-col items-center gap-3">
                    <span class="text-5xl">🖥️</span>
                    <span class="text-lg font-bold">מחשב</span>
                    <span class="text-xs text-gray-500">PC / Mac / Laptop</span>
                </button>
                <button onclick="selectDevice('phone', 'טלפון')" class="card rounded-2xl p-6 flex flex-col items-center gap-3">
                    <span class="text-5xl">📱</span>
                    <span class="text-lg font-bold">טלפון חכם</span>
                    <span class="text-xs text-gray-500">Android / iPhone</span>
                </button>
                <button onclick="selectDevice('tablet', 'טאבלט')" class="card rounded-2xl p-6 flex flex-col items-center gap-3">
                    <span class="text-5xl">📟</span>
                    <span class="text-lg font-bold">טאבלט</span>
                    <span class="text-xs text-gray-500">iPad / Samsung Tab</span>
                </button>
                <button onclick="selectDevice('peripheral', 'ציוד היקפי')" class="card rounded-2xl p-6 flex flex-col items-center gap-3">
                    <span class="text-5xl">🖨️</span>
                    <span class="text-lg font-bold">ציוד היקפי</span>
                    <span class="text-xs text-gray-500">מדפסת, עכבר, WiFi</span>
                </button>
            </div>
        </div>

        <!-- Screen 2: OS Selection -->
        <div id="screen-os" class="screen">
            <div class="flex items-center gap-2 text-sm text-gray-500 mb-4 cursor-pointer hover:text-sky-400" onclick="goScreen('device')">
                <span>🏠 חזרה לבחירת מכשיר</span>
            </div>
            <h1 class="text-3xl font-extrabold mb-2 text-center" id="os-title">איזו מערכת הפעלה?</h1>
            <p class="text-gray-400 text-center mb-8">סמן את המערכת הרלוונטית</p>

            <div class="flex items-center gap-2 mb-10 max-w-xs mx-auto">
                <div class="step-dot done">✓</div>
                <div class="step-line done"></div>
                <div class="step-dot active">2</div>
                <div class="step-line"></div>
                <div class="step-dot">3</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="os-options"></div>
        </div>

        <!-- Screen 3: Search & Answers -->
        <div id="screen-search" class="screen">
            <div class="flex items-center gap-4 text-sm mb-6 flex-wrap">
                <span onclick="goScreen('device')" class="text-gray-500 hover:text-white cursor-pointer">🏠 מכשיר: <b id="bread-device" class="text-sky-400"></b></span>
                <span class="text-gray-700">/</span>
                <span onclick="goScreen('os')" class="text-gray-500 hover:text-white cursor-pointer">💻 מערכת: <b id="bread-os" class="text-sky-400"></b></span>
            </div>

            <div class="relative mb-8">
                <input type="text" id="query-input" placeholder="תאר את הבעיה בקצרה... (למשל: איך מגדילים את הכתב?)" 
                       class="search-input w-full p-5 pr-6 rounded-2xl text-lg font-medium shadow-2xl"
                       oninput="debouncedSearch()" onkeydown="if(event.key==='Enter') triggerAI()">
                <button onclick="triggerAI()" class="absolute left-3 top-3 bg-sky-500 hover:bg-sky-400 text-black font-bold py-2 px-4 rounded-xl transition-colors">
                    🤖 שאל AI
                </button>
            </div>

            <div id="tags-container" class="flex flex-wrap gap-2 mb-8"></div>
            <div id="results-area" class="space-y-4"></div>

            <div id="answer-container" class="hidden mt-6 bg-[#1e293b] border border-indigo-500/30 rounded-3xl p-8 shadow-2xl">
                <div id="answer-content"></div>
            </div>
        </div>

    </main>

    <!-- Footer WhatsApp Button -->
    <div class="footer-container">
        <button onclick="openWaModal()" class="whatsapp-btn flex items-center justify-center gap-3 py-4 px-8 rounded-2xl shadow-xl font-bold text-lg">
            <span>עזרה מגימלאטק — 0505396068</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        </button>
    </div>

    <!-- Custom Modal -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-[200]">
        <div class="bg-[#1a2235] border border-gray-700 w-full max-w-sm rounded-3xl p-8 text-center">
            <h3 class="text-xl font-bold mb-4" id="modal-title">שלח למבוגר</h3>
            <p class="text-gray-400 mb-6" id="modal-desc">הכנס את מספר הטלפון:</p>
            <input type="tel" id="modal-input" placeholder="05XXXXXXXX" class="w-full p-4 bg-gray-900 border border-gray-700 rounded-xl mb-6 text-center text-xl">
            <div class="flex gap-2">
                <button onclick="confirmModal()" class="flex-1 bg-green-500 py-3 rounded-xl font-bold">שלח בוואטסאפ</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-700 py-3 rounded-xl">ביטול</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        let state = { device: '', deviceLabel: '', os: '', osLabel: '', currentAnswer: null, activeTag: null };
        
        const OS_OPTIONS = {
            computer: [{ id: 'WIN', label: 'Windows', icon: '🪟' }, { id: 'MAC', label: 'Mac', icon: '🍎' }],
            phone: [{ id: 'AND', label: 'Android', icon: '🤖' }, { id: 'IOS', label: 'iPhone', icon: '🍎' }],
            tablet: [{ id: 'AND', label: 'Android', icon: '🤖' }, { id: 'IOS', label: 'iPad', icon: '🍎' }],
            peripheral: [{ id: 'PC', label: 'מחשב (Windows)', icon: '🖥️' }, { id: 'MOB', label: 'טלפון (Mobile)', icon: '📱' }]
        };

        const KB = [
            // How-to Questions (איך)
            { id: 101, dev: ['AND', 'IOS'], cat: '⚙️ הגדרות', title: 'איך מגדילים את הכתב (גופן)?', steps: ['כנס להגדרות המכשיר', 'בחר ב"תצוגה" או "נגישות"', 'לחץ על "גודל טקסט" או "גופן"', 'גרור את הסמן ימינה עד שהכתב גדול מספיק'], tip: 'אפשר גם להפעיל "כתב מודגש" באותו תפריט כדי להקל על הקריאה.' },
            { id: 102, dev: ['AND', 'IOS'], cat: '🎥 תקשורת', title: 'איך מצטרפים לשיחת זום (Zoom)?', steps: ['לחץ על הקישור שקיבלת בוואטסאפ', 'אם האפליקציה מותקנת, היא תיפתח אוטומטית', 'לחץ על "Join with Video"', 'חשוב: לחץ על WiFi or Cellular Data כדי לשמוע ולהישמע'], tip: 'אם לא שומעים אתכם, בדקו שאין סמל של מיקרופון אדום עם קו עליו.' },
            { id: 103, dev: ['AND', 'IOS'], cat: '📱 וואטסאפ', title: 'איך שולחים תמונה בוואטסאפ?', steps: ['כנס לשיחה עם האדם הרצוי', 'לחץ על סמל המהדק או הפלוס (+)', 'בחר ב"גלריה" או "תמונות"', 'בחר את התמונה ולחץ על חץ השליחה הירוק'], tip: 'אפשר להוסיף כיתוב לתמונה לפני ששולחים אותה.' },
            { id: 104, dev: ['AND', 'IOS'], cat: '📸 מדיה', title: 'איך מוחקים תמונות כדי לפנות מקום?', steps: ['כנס לאפליקציית "גלריה" או "תמונות"', 'לחץ לחיצה ארוכה על תמונה שרוצים למחוק', 'סמן תמונות נוספות בלחיצה קלה', 'לחץ על סמל הפח ואשר את המחיקה'], tip: 'אל תשכחו לרוקן גם את "סל המחזור" בתוך הגלריה כדי שהמקום באמת יתפנה.' },
            { id: 105, dev: ['AND', 'IOS'], cat: '🔍 כללי', title: 'איך סורקים קוד QR?', steps: ['פתח את אפליקציית המצלמה', 'כוון את המצלמה לכיוון הריבוע של הקוד', 'המתן שיופיע קישור צהוב או לבן על המסך', 'לחץ על הקישור כדי להיכנס לאתר'], tip: 'במכשירים ישנים ייתכן שתצטרכו להוריד אפליקציית "סורק QR" מהחנות.' },
            { id: 106, dev: ['AND', 'IOS'], cat: '📱 וואטסאפ', title: 'איך מקליטים הודעה קולית?', steps: ['כנס לשיחה בוואטסאפ', 'לחץ והחזק את סמל המיקרופון הירוק', 'דבר בזמן שהסמל לחוץ', 'עזוב את הסמל כדי לשלוח את ההודעה'], tip: 'אם ההודעה ארוכה, אפשר להחליק את המיקרופון למעלה לכיוון המנעול כדי להקליט בלי להחזיק.' },
            
            // Existing Logic Items
            { id: 1, dev: ['WIN', 'MAC'], cat: '🌐 אינטרנט', title: 'אין חיבור לאינטרנט', steps: ['ודא שמתג ה-WiFi מופעל', 'נתק את הנתב מהחשמל ל-30 שניות וחבר שוב', 'בחר את הרשת הביתית והכנס סיסמה'], tip: 'לפעמים פשוט "כיבוי והדלקה" של המחשב פותר הכל.' },
            { id: 2, dev: ['AND', 'IOS'], cat: '📱 וואטסאפ', title: 'וואטסאפ לא נפתח', steps: ['סגור את האפליקציה לחלוטין', 'בדוק אם יש עדכון בחנות האפליקציות', 'הפעל מחדש את המכשיר'], tip: 'ודא שיש מספיק מקום פנוי בטלפון.' },
            { id: 3, dev: ['WIN'], cat: '❄️ ביצועים', title: 'המחשב איטי מאוד', steps: ['בצע הפעלה מחדש', 'סגור טאבים מיותרים בדפדפן', 'ודא שאין עדכוני מערכת שממתינים ברקע'], tip: 'מחשב שלא כובה שבועות נוטה להיות איטי.' }
        ];

        function goScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            window.scrollTo(0, 0);
        }

        function selectDevice(id, label) {
            state.device = id;
            state.deviceLabel = label;
            document.getElementById('bread-device').innerText = label;
            const container = document.getElementById('os-options');
            container.innerHTML = OS_OPTIONS[id].map(os => `
                <button onclick="selectOS('${os.id}', '${os.label}')" class="card rounded-2xl p-8 flex flex-col items-center gap-4">
                    <span class="text-5xl">${os.icon}</span>
                    <span class="text-xl font-bold">${os.label}</span>
                </button>
            `).join('');
            goScreen('os');
        }

        function selectOS(id, label) {
            state.os = id;
            state.osLabel = label;
            document.getElementById('bread-os').innerText = label;
            renderTags();
            searchKB('');
            goScreen('search');
        }

        function renderTags() {
            const container = document.getElementById('tags-container');
            const relevantKB = KB.filter(item => item.dev.includes(state.os));
            const cats = [...new Set(relevantKB.map(k => k.cat))];
            container.innerHTML = cats.map(cat => `<button onclick="filterTag('${cat}')" class="tag px-4 py-2 rounded-full text-sm font-medium ${state.activeTag === cat ? 'active' : ''}">${cat}</button>`).join('');
        }

        function filterTag(cat) {
            state.activeTag = state.activeTag === cat ? null : cat;
            renderTags();
            searchKB(document.getElementById('query-input').value);
        }

        let searchTimeout;
        function debouncedSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => searchKB(document.getElementById('query-input').value), 300);
        }

        function searchKB(q) {
            const resultsArea = document.getElementById('results-area');
            const answerContainer = document.getElementById('answer-container');
            answerContainer.classList.add('hidden');
            const filtered = KB.filter(item => item.dev.includes(state.os) && 
                (item.title.toLowerCase().includes(q.toLowerCase()) || item.cat.toLowerCase().includes(q.toLowerCase())) && 
                (!state.activeTag || item.cat === state.activeTag));
            
            if (filtered.length === 0 && q.length > 2) {
                resultsArea.innerHTML = `<div class="text-center py-12 bg-gray-800/30 rounded-3xl border border-dashed border-gray-700"><p class="text-gray-400 mb-4">לא מצאנו פתרון מוכן במאגר...</p><button onclick="triggerAI()" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-xl font-bold">🤖 שאל את עוזר ה-AI שלנו</button></div>`;
                return;
            }
            resultsArea.innerHTML = filtered.map(item => `<div onclick='showAnswer(${JSON.stringify(item)})' class="card p-5 rounded-2xl cursor-pointer flex justify-between items-center group"><div><span class="text-xs text-sky-400 font-bold uppercase tracking-widest">${item.cat}</span><h3 class="text-lg font-bold mt-1">${item.title}</h3></div><span class="text-gray-600 group-hover:text-white">◀</span></div>`).join('');
        }

        function showAnswer(item) {
            state.currentAnswer = item;
            document.getElementById('results-area').innerHTML = '';
            const container = document.getElementById('answer-container');
            container.classList.remove('hidden');
            document.getElementById('answer-content').innerHTML = `
                <div class="flex items-center gap-2 mb-4"><span class="bg-green-500/20 text-green-400 text-xs font-bold px-2 py-1 rounded border border-green-500/20">פתרון מומלץ</span></div>
                <h2 class="text-2xl font-black mb-6">${item.title}</h2>
                <div class="space-y-4 mb-8">
                    ${item.steps.map((step, i) => `<div class="flex gap-4 items-start"><span class="flex-shrink-0 w-8 h-8 bg-sky-500 text-black font-bold rounded-full flex items-center justify-center">${i + 1}</span><p class="text-lg pt-1">${step}</p></div>`).join('')}
                </div>
                <div class="bg-amber-500/10 border border-amber-500/20 rounded-2xl p-4 mb-6"><p class="text-amber-400 text-sm">💡 <b>טיפ:</b> ${item.tip}</p></div>
                <button onclick="openShareModal()" class="w-full bg-green-500 hover:bg-green-400 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 shadow-lg">📱 שלח הוראות למבוגר בוואטסאפ</button>
            `;
            container.scrollIntoView({ behavior: 'smooth' });
        }

        async function fetchWithRetry(url, options, retries = 5, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    if (response.status !== 429 && response.status < 500) break;
                } catch (e) {}
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2;
            }
            throw new Error("Failed after retries");
        }

        async function triggerAI() {
            const query = document.getElementById('query-input').value;
            if (!query) return;

            const answerContainer = document.getElementById('answer-container');
            answerContainer.classList.remove('hidden');
            document.getElementById('answer-content').innerHTML = `<div class="flex flex-col items-center py-10 gap-4"><div class="spinner"></div><p class="text-indigo-300">ה-AI מנתח ומכין פתרון...</p></div>`;

            const systemPrompt = `אתה מומחה תמיכה טכנית עבור "גימלאטק". תפקידך לעזור למתנדבים להסביר דברים למבוגרים. השתמש בשפה פשוטה. מכשיר: ${state.deviceLabel} (${state.osLabel}). החזר JSON בלבד.`;

            const payload = {
                contents: [{ parts: [{ text: `הבעיה: ${query}` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { 
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            title: { type: "STRING" },
                            steps: { type: "ARRAY", items: { type: "STRING" } },
                            tip: { type: "STRING" }
                        },
                        required: ["title", "steps", "tip"]
                    }
                }
            };

            try {
                const result = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }
                );
                
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) throw new Error("Empty response");
                
                const aiResponse = JSON.parse(text);
                showAnswer({ ...aiResponse, cat: '🤖 AI HELPER' });
            } catch (err) {
                document.getElementById('answer-content').innerHTML = `
                    <div class="text-center py-8">
                        <p class="text-red-400 font-bold mb-2">שגיאה בתקשורת עם ה-AI</p>
                        <p class="text-sm text-gray-400">המערכת לא הצליחה לקבל תשובה. נסה לנסח את השאלה אחרת.</p>
                        <button onclick="triggerAI()" class="mt-4 text-sky-400 underline">נסה שוב</button>
                    </div>
                `;
            }
        }

        let currentModalAction = '';
        function openWaModal() {
            currentModalAction = 'support';
            document.getElementById('modal-title').innerText = 'צ\'אט עם תמיכת גימלאטק';
            document.getElementById('modal-input').value = '0505396068';
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        function openShareModal() {
            currentModalAction = 'share';
            document.getElementById('modal-title').innerText = 'שלח הוראות למבוגר';
            document.getElementById('modal-input').value = '';
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

        function confirmModal() {
            let phone = document.getElementById('modal-input').value.replace(/\D/g, '');
            if (!phone) return;
            if (phone.startsWith('0')) phone = '972' + phone.substring(1);
            let message = currentModalAction === 'share' && state.currentAnswer ? `*פתרון עבור: ${state.currentAnswer.title}*\n\n${state.currentAnswer.steps.map((s,i) => `*${i+1}.* ${s}`).join('\n')}\n\n💡 *טיפ:* ${state.currentAnswer.tip}` : "היי, אני מתנדב בגימלאטק וזקוק לעזרה...";
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
            closeModal();
        }
    </script>
</body>
</html>
