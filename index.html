<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GimlaTech Helper</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #e2e8f0; }
        .app-container { max-width: 450px; min-height: 85vh; margin: 2rem auto; background: white; border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); border: 8px solid #1e293b; position: relative; overflow: hidden; display: flex; flex-column: column; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 28 }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [step, setStep] = useState(1);
            const [data, setData] = useState({ device: '', os: '', issue: '' });

            const devices = [
                { id: 'pc', name: 'מחשב', icon: 'monitor', color: 'bg-blue-500' },
                { id: 'phone', name: 'טלפון', icon: 'smartphone', color: 'bg-green-500' },
                { id: 'extra', name: 'ציוד היקפי', icon: 'printer', color: 'bg-purple-500' }
            ];

            const osOptions = {
                pc: ['Windows (ווינדוס)', 'Mac (מחשב אפל)'],
                phone: ['Android (סמסונג/שיאומי)', 'iPhone (אייפון)'],
                extra: ['מדפסת', 'עכבר/מקלדת', 'רמקולים']
            };

            const issues = ['האינטרנט לא עובד 🌐', 'המכשיר לא נדלק 🔌', 'המסך קפוא ❄️', 'משהו אחר (הקלדה)...'];

            const selectDevice = (d) => { setData({...data, device: d}); setStep(2); };
            const selectOS = (o) => { setData({...data, os: o}); setStep(3); };

            return (
                <div className="app-container flex flex-col">
                    {/* Header */}
                    <div className="bg-slate-800 text-white p-4 flex justify-between items-center">
                        <span className="font-bold text-lg">GimlaTech Helper</span>
                        <button onClick={() => setStep(1)} className="text-xs bg-slate-700 px-2 py-1 rounded">התחל מחדש</button>
                    </div>

                    <div className="p-6 flex-grow overflow-y-auto">
                        
                        {/* מסך 1: בחירת מכשיר */}
                        {step === 1 && (
                            <div className="space-y-6">
                                <div className="text-center mb-6">
                                    <h2 className="text-2xl font-bold text-slate-800">שלום!</h2>
                                    <p className="text-slate-500">באיזה מכשיר יש תקלה?</p>
                                </div>
                                {devices.map(d => (
                                    <button key={d.id} onClick={() => selectDevice(d.id)} 
                                        className="w-full flex items-center p-6 bg-white border-2 border-slate-100 rounded-2xl shadow-sm hover:border-blue-500 transition-all">
                                        <div className={`${d.color} p-3 rounded-full text-white ml-4`}><Icon name={d.icon}/></div>
                                        <span className="text-xl font-bold">{d.name}</span>
                                    </button>
                                ))}
                                <button className="w-full mt-4 flex items-center justify-center gap-2 p-3 bg-slate-100 rounded-xl text-slate-600 font-bold">
                                    <Icon name="camera" size={20}/> העלאת צילום מסך
                                </button>
                            </div>
                        )}

                        {/* מסך 2: מערכת הפעלה בהתאמה */}
                        {step === 2 && (
                            <div className="space-y-4">
                                <button onClick={() => setStep(1)} className="text-blue-600 font-bold">← חזרה</button>
                                <h2 className="text-xl font-bold mb-4">איזה סוג בדיוק?</h2>
                                {osOptions[data.device].map(os => (
                                    <button key={os} onClick={() => selectOS(os)}
                                        className="w-full p-5 bg-white border-2 border-slate-100 rounded-xl text-right text-lg font-bold hover:bg-blue-50">
                                        {os}
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* מסך 3: בחירת תקלה */}
                        {step === 3 && (
                            <div className="space-y-4">
                                <button onClick={() => setStep(2)} className="text-blue-600 font-bold">← חזרה</button>
                                <h2 className="text-xl font-bold mb-4">מה הבעיה ב-{data.os}?</h2>
                                {issues.map(issue => (
                                    <button key={issue} onClick={() => alert('מפעיל סורק תקלות עבור ' + issue)}
                                        className="w-full p-4 bg-white border-r-8 border-blue-500 rounded-lg shadow-sm text-right font-medium">
                                        {issue}
                                    </button>
                                ))}
                                <div className="mt-8 p-4 bg-blue-50 rounded-xl border border-blue-100">
                                    <p className="text-sm font-bold text-blue-800 mb-2">עזרה מהירה מה-AI:</p>
                                    <textarea className="w-full p-2 rounded border" placeholder="תאר את הבעיה כאן..."></textarea>
                                    <button className="w-full bg-blue-600 text-white p-2 mt-2 rounded font-bold">שלח לבדיקה</button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Footer / Share */}
                    <div className="p-4 bg-slate-50 border-t flex justify-center">
                        <button onClick={() => alert('קישור הועתק!')} className="flex items-center gap-2 text-slate-500 font-bold border-2 border-slate-200 px-4 py-2 rounded-full hover:bg-white">
                            <Icon name="share-2" size={18}/> שיתוף האפליקציה
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
