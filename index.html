function go2(device){selDevice=device;var cat=categories[device];document.getElementById('os-title').innerText=cat.title;var list=document.getElementById('os-list');list.innerHTML='';cat.types.forEach(function(type){var b=document.createElement('button');b.className='btn';b.textContent=type;b.onclick=function(){go3(type);};list.appendChild(b);});show('s2');}
function go3(os){selOS=os;var osKey=clean(os);document.getElementById('tag-device').textContent=os;document.getElementById('tag-device2').textContent=os;var topicList=topics[osKey]||topics['windows'];var list=document.getElementById('topic-list');list.innerHTML='';topicList.forEach(function(topic){var b=document.createElement('button');b.className='btn';b.textContent=topic;b.onclick=function(){go4(topic);};list.appendChild(b);});show('s3');}
function go4(topic){selTopic=topic;var osKey=clean(selOS);var topicKey=clean(topic);document.getElementById('tag-topic').textContent=topic;var probKey=osKey+'|'+topicKey;var probList=problems[probKey];var list=document.getElementById('problem-list');list.innerHTML='';if(!probList){showAnswer(topic);return;}probList.forEach(function(prob){var b=document.createElement('button');b.className='btn';b.textContent=prob;b.onclick=function(){showAnswer(prob);};list.appendChild(b);});var wa=document.createElement('a');wa.href='https://wa.me/972505396068';wa.target='_blank';wa.className='btn';wa.style.color='#25d366';wa.style.borderColor='#25d366';wa.textContent='❓ לא מצאתי — שלחו לגימלאטק';list.appendChild(wa);show('s4');}
function showAnswer(problem){var osKey=clean(selOS);var topicKey=clean(selTopic);var probKey=osKey+'|'+topicKey+'|'+problem.toLowerCase();var data=answers[probKey]||defaultAnswer;var stepsHTML=data.steps.map(function(s,i){return '<div class="step"><div class="step-num">'+(i+1)+'</div><div class="step-text">'+s+'</div></div>';}).join('');document.getElementById('answer-area').innerHTML='<div class="answer-card"><h3>'+data.title+'</h3>'+stepsHTML+'<div class="tip">'+data.tip+'</div></div><a class="wa-inline" href="https://wa.me/972505396068" target="_blank">עדיין לא פתור? דברו עם גימלאטק 💬</a>';show('s5');}
</script>
